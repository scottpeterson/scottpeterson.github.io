      <td class="stats-only">${a.count_elite}</td>
      <td class="stats-only">${fmt(a.avg_min, 0)}</td>
      <td class="stats-only">${fmt(a.avg_pts_per30)}</td>
      <td class="stats-only">${fmt(a.avg_reb_per30)}</td>
      <td class="stats-only">${fmt(a.avg_ast_per30)}</td>
    </tr>`;
          })
          .join('');
      }

      function renderHighlight(label, rec, unit, digits) {
        if (!rec) {
          return `<div class="highlight empty"><div class="label">${label}</div>
      <div class="value">—</div><div class="who">no qualifying players</div></div>`;
        }
        return `<div class="highlight"><div class="label">${label}</div>
    <div class="value">${fmt(rec.value, digits)}${unit}</div>
    <div class="who">${rec.player}</div>
    <div class="team">${rec.team}</div></div>`;
      }

      function renderBuckets() {
        const host = document.getElementById('buckets');
        const hasStats = DATA.meta.has_stats;
        const otherHdr = otherSchoolHeader();

        if (DATA.meta.total_transfers === 0) {
          host.innerHTML = `<div class="card"><p class="empty-state">No ${CURRENT_DIRECTION} transfers tracked for ${CURRENT_LABEL} yet.</p></div>`;
          return;
        }

        host.innerHTML = DATA.buckets
          .filter(b => b.agg.count_total > 0)
          .map(b => {
            const a = b.agg;
            const topPerformers = hasStats
              ? `
      <h3>Top performers${isOutgoing() ? ' (last D3 season)' : ''}</h3>
      <div class="highlight-grid">
        ${renderHighlight('Most minutes', a.max_min, ' MIN', 0)}
        ${renderHighlight('Max PTS/30', a.max_pts_per30, '', 1)}
        ${renderHighlight('Max REB/30', a.max_reb_per30, '', 1)}
        ${renderHighlight('Max AST/30', a.max_ast_per30, '', 1)}
      </div>`
              : '';
            const counts = hasStats
              ? `
      <div class="counts">
        <div class="count-item"><span class="count-label">Total</span><span class="count-value">${a.count_total}</span></div>
        <div class="count-item"><span class="count-label">Produced stats</span><span class="count-value">${a.count_matched}</span></div>
        <div class="count-item"><span class="count-label">No stats recorded</span><span class="count-value" style="color:#dc2626">${a.count_total - a.count_matched}</span></div>
        <div class="count-item"><span class="count-label">Qualifying (&ge;${MIN_QUAL} MIN)</span><span class="count-value">${a.count_qualifying}</span></div>
        <div class="count-item"><span class="count-label">&#9733; Elite team</span><span class="count-value" style="color:#b45309">${a.count_elite}</span></div>
      </div>`
              : `
      <div class="counts">
        <div class="count-item"><span class="count-label">Total commitments</span><span class="count-value">${a.count_total}</span></div>
      </div>`;
            return `<div class="card">
      <h2>${bucketHeader(b.name)} <span class="tag">${a.count_total} transfers</span></h2>
      ${counts}
      ${topPerformers}
      <h3>${hasStats ? 'All transfers' : 'Commitments'}</h3>
      <div class="table-wrap">
      <table class="players" data-bucket="${b.name}">
      <thead><tr>
        <th class="left" data-col="name" data-type="str">Player <span class="sort-arrow"></span></th>
        <th class="left" data-col="d3_team" data-type="str">D3 Team <span class="sort-arrow"></span></th>
        <th data-col="class" data-type="str" class="stats-only">Class <span class="sort-arrow"></span></th>
        <th class="left" data-col="other_school" data-type="str">${otherHdr} <span class="sort-arrow"></span></th>
        <th data-col="level" data-type="str">Lvl <span class="sort-arrow"></span></th>
        <th data-col="min" data-type="num" class="stats-only">MIN <span class="sort-arrow"></span></th>
        <th data-col="pts" data-type="num" class="stats-only">PTS <span class="sort-arrow"></span></th>
        <th data-col="reb" data-type="num" class="stats-only">REB <span class="sort-arrow"></span></th>
        <th data-col="ast" data-type="num" class="stats-only">AST <span class="sort-arrow"></span></th>
        <th data-col="pts_per30" data-type="num" class="stats-only">PTS/30 <span class="sort-arrow"></span></th>
        <th data-col="reb_per30" data-type="num" class="stats-only">REB/30 <span class="sort-arrow"></span></th>
        <th data-col="ast_per30" data-type="num" class="stats-only">AST/30 <span class="sort-arrow"></span></th>
      </tr></thead>
      <tbody>
      ${b.players
        .map(p => {
          const cls = !p.matched
            ? 'unmatched'
            : !p.qualifying
              ? 'not-qualifying'
              : '';
          const dash = '—';
          const teamCell = p.matched
            ? p.d3_team
            : p.d3_team
              ? `${p.d3_team} <span class="no-stats-badge">no stats recorded</span>`
              : '<span class="no-stats-badge">no stats recorded</span>';
          const eliteBadge = p.elite_team
            ? ' <span class="elite-badge" title="D3 team is Top-100 NPI & Top-100 SOS">&#9733;</span>'
            : '';
          const otherSchool = p.other_school || dash;
          return `<tr class="${cls}">
          <td class="left">${p.name}${eliteBadge}</td>
          <td class="left">${teamCell}</td>
          <td class="stats-only">${p.class || dash}</td>
          <td class="left">${otherSchool}</td>
          <td>${levelPill(p.level)}</td>
          <td class="stats-only">${p.matched ? fmtInt(p.min) : dash}</td>
          <td class="stats-only">${p.matched ? fmtInt(p.pts) : dash}</td>
          <td class="stats-only">${p.matched ? fmtInt(p.reb) : dash}</td>
          <td class="stats-only">${p.matched ? fmtInt(p.ast) : dash}</td>
          <td class="stats-only">${p.matched && p.min > 0 ? fmt(p.pts_per30) : dash}</td>
          <td class="stats-only">${p.matched && p.min > 0 ? fmt(p.reb_per30) : dash}</td>
          <td class="stats-only">${p.matched && p.min > 0 ? fmt(p.ast_per30) : dash}</td>
        </tr>`;
        })
        .join('')}
      </tbody>
      </table>
      </div>
    </div>`;
          })
          .join('');
      }

      function wireSorting() {
        document.querySelectorAll('table.players').forEach(table => {
          const headers = table.querySelectorAll('th');
          headers.forEach(th => {
            th.addEventListener('click', () => {
              const type = th.dataset.type;
              const tbody = table.querySelector('tbody');
              const rows = Array.from(tbody.querySelectorAll('tr'));
              const asc = !th.classList.contains('sort-asc');
              headers.forEach(h =>
                h.classList.remove('sort-asc', 'sort-desc', 'sort-active')
              );
              th.classList.add('sort-active', asc ? 'sort-asc' : 'sort-desc');
              const colIdx = Array.from(headers).indexOf(th);
              rows.sort((r1, r2) => {
                const a = r1.children[colIdx].textContent.trim();
                const b = r2.children[colIdx].textContent.trim();
                if (type === 'num') {
                  const av =
                    a === '—' ? -Infinity : parseFloat(a.replace(/,/g, ''));
                  const bv =
                    b === '—' ? -Infinity : parseFloat(b.replace(/,/g, ''));
                  return asc ? av - bv : bv - av;
                }
                return asc ? a.localeCompare(b) : b.localeCompare(a);
              });
              rows.forEach(r => tbody.appendChild(r));
              th.querySelector('.sort-arrow').textContent = asc ? '▲' : '▼';
              headers.forEach(h => {
                if (h !== th) h.querySelector('.sort-arrow').textContent = '';
              });
            });
          });
        });
      }

      function applyView() {
        DATA = SEASONS[CURRENT_LABEL][CURRENT_DIRECTION];
        document.body.classList.toggle('preseason', !DATA.meta.has_stats);

        const dirWord = isOutgoing() ? 'Outgoing' : 'Incoming';
        document.getElementById('subtitle').textContent =
          `${CURRENT_LABEL} ${dirWord} Transfers by ${divisionHeader()}`;

        const meta = DATA.meta;
        const noteParts = [`${meta.data_dir}/${meta.transfers_filename}`];
        if (meta.has_lookup_stats)
          noteParts.push(`${meta.stats_dir}/players.csv`);
        document.getElementById('source-note').textContent =
          `Generated from ${noteParts.join(' and ')}`;

        document
          .querySelectorAll('.season-tab')
          .forEach(b =>
            b.classList.toggle('active', b.dataset.season === CURRENT_LABEL)
          );
        document
          .querySelectorAll('.dir-tab')
          .forEach(b =>
            b.classList.toggle(
              'active',
              b.dataset.direction === CURRENT_DIRECTION
            )
          );

        renderSummaryHeader();
        renderSummary();
        renderBuckets();
        wireSorting();
      }

      document.querySelectorAll('.season-tab').forEach(btn => {
        btn.addEventListener('click', () => {
          CURRENT_LABEL = btn.dataset.season;
          applyView();
        });
      });
      document.querySelectorAll('.dir-tab').forEach(btn => {
        btn.addEventListener('click', () => {
          CURRENT_DIRECTION = btn.dataset.direction;
          applyView();
        });
      });

      applyView();
    </script>
  </body>
</html>
