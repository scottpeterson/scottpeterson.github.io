name: Build check

# Enforces the build's idempotency contract: the committed site must be exactly
# what `npm run build` produces. Generated HTML and encoded data are checked in,
# so they must be regenerated and committed — never hand-edited. If a fresh build
# changes anything, the committed files are stale and this job fails.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-is-committed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history is required: the data pages' "Last updated" line is the
          # data file's git commit date (build.js getDataUpdatedDate). A shallow
          # clone would lose those commits and produce a different timestamp,
          # i.e. a false-positive diff.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Fail if the build changed any committed file
        run: |
          if ! git diff --exit-code; then
            echo "::error::Generated files are out of date. Run 'npm run build' locally and commit the result."
            exit 1
          fi
